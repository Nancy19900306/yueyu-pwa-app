<!-- PWA 支持 -->
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#F0F7F4">
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>粤语闯关王 - 趣味听说训练</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://data.zcat.cn/cdn/npm/@tailwindcss/3.4.17.js"></script>
    
    <style>
        /* 基础设置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
            background-color: #F0F7F4; /* 护眼浅青绿 */
            user-select: none; /* 防止误选文本 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* 优化触摸响应 */
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 动画定义 */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes fire-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-fire { animation: fire-pulse 1s infinite; }

        /* 按钮点击反馈 */
        .btn-active:active { transform: scale(0.96); }
        
        /* 玻璃拟态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col text-gray-700">

    <!-- ================= 顶部状态栏 (自适应) ================= -->
    <header class="h-14 sm:h-16 bg-white shadow-sm flex items-center justify-between px-4 sm:px-6 z-20 shrink-0">
        <!-- 左侧：标题 -->
        <div class="flex items-center gap-2 sm:gap-4 w-1/3">
            <div class="text-xl sm:text-2xl font-bold text-blue-600 tracking-wider cursor-pointer flex items-center" onclick="showMap()">
                <span class="mr-2">🎓</span> <span class="hidden sm:inline">粤语闯关王</span><span class="sm:hidden">闯关王</span>
            </div>
            <!-- 手机端隐藏进度条文字，只留小圆点或简化 -->
            <div class="hidden md:flex flex-col w-32 lg:w-48">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span>总进度</span>
                    <span id="global-progress-text">0 / 500</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="global-progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 中间：当前关卡 (手机端简化) -->
        <div class="flex items-center gap-2 bg-yellow-50 px-3 py-1 rounded-full border border-yellow-200">
            <span class="text-yellow-600 font-bold text-sm sm:text-lg" id="header-level-name">第 1 关</span>
            <span class="text-gray-300 hidden sm:inline">|</span>
            <span class="text-gray-600 text-xs sm:text-sm font-medium truncate max-w-[80px] sm:max-w-none" id="header-level-topic">基础问候</span>
        </div>

        <!-- 右侧：连胜与错题本 -->
        <div class="flex items-center gap-2 sm:gap-4 w-1/3 justify-end">
            <div class="flex items-center gap-1 sm:gap-2 bg-orange-50 px-2 sm:px-3 py-1 rounded-lg border border-orange-100">
                <span class="text-orange-500 animate-fire text-lg">🔥</span>
                <span class="font-bold text-orange-600 text-sm sm:text-base" id="streak-display">0 天</span>
            </div>
            
            <button onclick="showWrongBook()" class="relative bg-red-50 hover:bg-red-100 text-red-500 p-2 rounded-lg border border-red-100 transition-all btn-active">
                <span class="text-xl">📚</span>
                <span id="wrong-count-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 sm:w-5 sm:h-5 rounded-full flex items-center justify-center shadow-sm">0</span>
            </button>
        </div>
    </header>

    <!-- ================= 主内容区域 ================= -->
    <main class="flex-1 relative overflow-hidden flex">
        
        <!-- 视图 1: 关卡地图 -->
        <div id="view-map" class="absolute inset-0 bg-[#F0F7F4] p-4 sm:p-6 overflow-y-auto no-scrollbar transition-opacity duration-300">
            <!-- 网格自适应：手机 1 列，平板 2 列，大屏 5 列 -->
            <div class="max-w-5xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 sm:gap-6 pb-10">
                <!-- 关卡卡片由 JS 生成 -->
            </div>
        </div>

        <!-- 视图 2: 学习挑战区 (仅听音辨意) -->
        <div id="view-learning" class="absolute inset-0 bg-gray-50 hidden flex-col items-center justify-center p-4 sm:p-6">
            
            <!-- 顶部返回 -->
            <div class="absolute top-4 left-4 z-10">
                <button onclick="showMap()" class="bg-white hover:bg-gray-100 text-gray-600 px-4 py-2 rounded-xl shadow-md font-bold flex items-center gap-2 btn-active transition-all text-sm sm:text-base">
                    <span>⬅️</span> <span class="hidden sm:inline">返回地图</span>
                </button>
            </div>
            
            <!-- 星星计数 -->
            <div class="absolute top-4 right-4 z-10 flex gap-2">
                <div class="bg-white px-3 py-1 rounded-lg shadow text-sm font-bold text-gray-500 flex items-center gap-1">
                    <span>⭐</span> <span id="level-stars">0</span>/3
                </div>
            </div>

            <!-- 核心卡片容器 -->
            <div class="w-full max-w-2xl h-full flex flex-col justify-center gap-4 sm:gap-6 pb-10">
                
                <!-- 进度指示器 -->
                <div class="flex justify-center gap-2 mb-2">
                    <div class="w-24 h-2 bg-blue-500 rounded-full transition-all"></div>
                    <div class="w-24 h-2 bg-gray-200 rounded-full transition-all"></div>
                </div>

                <!-- 听力挑战卡片 -->
                <div id="stage-listening" class="flex-1 flex flex-col items-center justify-center animate-pop">
                    <div class="glass-card w-full rounded-3xl shadow-xl p-6 sm:p-8 flex flex-col items-center text-center relative overflow-hidden">
                        <!-- 装饰条 -->
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-cyan-300"></div>
                        
                        <h2 class="text-xl sm:text-2xl font-bold text-gray-700 mb-4 sm:mb-6">👂 听音辨意</h2>
                        
                        <!-- 播放按钮 (大尺寸，适合手指) -->
                        <div class="mb-6 sm:mb-8 relative group cursor-pointer" onclick="playCurrentAudio()">
                            <div class="w-24 h-24 sm:w-32 sm:h-32 bg-blue-50 rounded-full flex items-center justify-center shadow-inner group-hover:bg-blue-100 transition-colors btn-active border-4 border-white">
                                <span class="text-5xl sm:text-6xl">🔊</span>
                            </div>
                            <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 bg-white px-3 py-1 rounded-full text-xs text-gray-500 shadow-sm whitespace-nowrap border border-gray-100">
                                点击重听
                            </div>
                        </div>

                        <!-- 选项网格 (手机 1 列，平板 2 列) -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 w-full" id="options-container">
                            <!-- 选项由 JS 生成 -->
                        </div>

                        <!-- 反馈区域 -->
                        <div id="listening-feedback" class="hidden mt-4 sm:mt-6 w-full p-3 sm:p-4 rounded-xl flex items-center justify-center gap-2 sm:gap-3 font-bold text-base sm:text-lg">
                            <!-- 动态内容 -->
                        </div>
                    </div>
                </div>

                <!-- 完成弹窗 -->
                <div id="completion-modal" class="hidden absolute inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm p-4">
                    <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl animate-pop">
                        <div class="text-6xl mb-4">🎉</div>
                        <h2 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">关卡完成!</h2>
                        <p class="text-gray-500 mb-6">你获得了 <span id="modal-stars" class="text-yellow-500 font-bold text-xl">★★★</span></p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-blue-50 p-3 rounded-xl">
                                <div class="text-xs text-gray-500">本关掌握</div>
                                <div class="font-bold text-blue-600" id="modal-sentences">0 句</div>
                            </div>
                            <div class="bg-orange-50 p-3 rounded-xl">
                                <div class="text-xs text-gray-500">总进度</div>
                                <div class="font-bold text-orange-600" id="modal-total">0/500</div>
                            </div>
                        </div>

                        <button onclick="showMap()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg btn-active">
                            继续挑战
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- 视图 3: 错题本 -->
        <div id="view-wrongbook" class="absolute inset-0 bg-[#F0F7F4] hidden flex-col p-4 sm:p-6 overflow-hidden">
            <div class="flex items-center justify-between mb-4 sm:mb-6">
                <button onclick="showMap()" class="bg-white hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-xl shadow-md font-bold flex items-center gap-2 btn-active transition-all text-sm sm:text-base">
                    <span>⬅️</span> 返回
                </button>
                <h2 class="text-xl sm:text-2xl font-bold text-red-600 flex items-center"><span class="mr-2">📕</span>我的错题本</h2>
                <div class="w-16 sm:w-24"></div>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar pb-10">
                <div id="wrong-list-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                    <!-- 错题卡片 -->
                </div>
                
                <div id="wrong-empty-state" class="hidden flex-col items-center justify-center h-64 text-gray-400">
                    <span class="text-6xl mb-4">✅</span>
                    <p class="text-lg font-bold">太棒了！目前没有错题</p>
                    <p class="text-sm">继续保持，争取全对通关！</p>
                </div>
            </div>
        </div>

    </main>

    <!-- ================= JavaScript 逻辑 ================= -->
    <script>
        // ==========================================
        // 1. 数据定义 (Data Structure)
        // ==========================================
        
        const LEVELS_CONFIG = [
            { id: 1, topic: "基础问候", icon: "👋", color: "blue" },
            { id: 2, topic: "礼貌用语", icon: "🙏", color: "red" },
            { id: 3, topic: "饮食点餐", icon: "🍜", color: "orange" },
            { id: 4, topic: "购物问价", icon: "💰", color: "purple" },
            { id: 5, topic: "交通出行", icon: "🚌", color: "indigo" },
            { id: 6, topic: "问路求助", icon: "🗺️", color: "cyan" },
            { id: 7, topic: "时间与数字", icon: "⏰", color: "teal" },
            { id: 8, topic: "紧急情况", icon: "⚠️", color: "red" },
            { id: 9, topic: "校园生活", icon: "🎒", color: "blue" },
            { id: 10, topic: "情感日常", icon: "😊", color: "yellow" }
        ];

        const SENTENCE_DB = {
            1: [
                { c: "你好", j: "nei5 hou2", m: "你好", d: ["再见", "谢谢", "对不起"] },
                { c: "早晨", j: "zou2 san4", m: "早上好", d: ["晚上好", "中午好", "晚安"] },
                { c: "再见", j: "zoi3 gin3", m: "再见", d: ["你好", "欢迎", "慢走"] },
                { c: "最近点啊？", j: "zeoi3 gan6 dim2 aa3?", m: "最近怎么样？", d: ["你去哪里？", "你叫什么？", "吃饭了吗？"] },
                { c: "好耐冇见", j: "hou2 noi6 mou5 gin3", m: "好久不见", d: ["初次见面", "很高兴", "没关系"] }
            ],
            2: [
                { c: "多谢", j: "do1 ze6", m: "谢谢", d: ["对不起", "你好", "再见"] },
                { c: "唔该", j: "m4 goi1", m: "劳驾/谢谢 (服务)", d: ["你好", "再见", "对不起"] },
                { c: "对不起", j: "deoi3 bat1 hei2", m: "对不起", d: ["没关系", "谢谢你", "不要紧"] },
                { c: "冇关系", j: "mou5 gwaan1 hai6", m: "没关系", d: ["对不起", "谢谢你", "你好"] },
                { c: "辛苦晒", j: "san1 fu2 saai3", m: "辛苦了", d: ["谢谢你", "对不起", "你好"] }
            ]
        };

        function generateSentences(levelId) {
            if (SENTENCE_DB[levelId]) return SENTENCE_DB[levelId];
            // 生成模拟数据用于测试
            let sentences = [];
            for(let i=1; i<=5; i++) {
                sentences.push({
                    c: `第${levelId}关句子${i}`,
                    j: `dei6 ${levelId} gun1 cou3 zi5 ${i}`,
                    m: `这是第${levelId}关的第${i}个练习句`,
                    d: [`错误选项 A`, `错误选项 B`, `错误选项 C`]
                });
            }
            return sentences;
        }

        // ==========================================
        // 2. 状态管理 (State Management)
        // ==========================================
        
        const STATE = {
            currentLevel: 1,
            currentSentenceIndex: 0,
            streak: 0,
            lastLoginDate: null,
            levelProgress: {},
            totalLearned: 0,
            wrongBook: []
        };

        function initApp() {
            loadData();
            checkStreak();
            renderMap();
            updateHeader();
        }

        function loadData() {
            const saved = localStorage.getItem('cantoneseHeroData');
            if (saved) {
                const parsed = JSON.parse(saved);
                Object.assign(STATE, parsed);
            }
        }

        function saveData() {
            localStorage.setItem('cantoneseHeroData', JSON.stringify(STATE));
            updateHeader();
        }

        function checkStreak() {
            const today = new Date().toDateString();
            if (STATE.lastLoginDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (STATE.lastLoginDate === yesterday.toDateString()) {
                    STATE.streak++;
                } else if (STATE.lastLoginDate !== today) {
                    STATE.streak = 1;
                }
                STATE.lastLoginDate = today;
                saveData();
            }
        }

        // ==========================================
        // 3. 视图渲染 (Rendering)
        // ==========================================

        function renderMap() {
            const container = document.querySelector('#view-map .grid');
            container.innerHTML = '';

            LEVELS_CONFIG.forEach((level, index) => {
                const progress = STATE.levelProgress[level.id] || { stars: 0, completed: false };
                const isLocked = index > 0 && !STATE.levelProgress[LEVELS_CONFIG[index-1].id]?.completed;
                
                const colorClasses = {
                    blue: 'bg-blue-500', red: 'bg-red-500', orange: 'bg-orange-500',
                    purple: 'bg-purple-500', indigo: 'bg-indigo-500', cyan: 'bg-cyan-500',
                    teal: 'bg-teal-500', yellow: 'bg-yellow-500'
                };
                const bgColor = colorClasses[level.color] || 'bg-gray-500';

                const card = document.createElement('div');
                card.className = `relative group cursor-pointer transition-all duration-300 ${isLocked ? 'opacity-50 grayscale pointer-events-none' : 'hover:-translate-y-1 hover:shadow-xl'}`;
                
                let starsHtml = '';
                for(let i=1; i<=3; i++) {
                    starsHtml += `<span class="text-${i <= progress.stars ? 'yellow-400' : 'gray-300'} text-lg">⭐</span>`;
                }

                card.innerHTML = `
                    <div class="bg-white rounded-2xl p-4 sm:p-6 shadow-md border-b-4 ${bgColor.replace('bg-', 'border-')} h-40 sm:h-48 flex flex-col items-center justify-between">
                        <div class="w-14 h-14 sm:w-16 sm:h-16 ${bgColor} rounded-full flex items-center justify-center text-3xl shadow-lg mb-2">
                            ${level.icon}
                        </div>
                        <div class="text-center w-full">
                            <div class="font-bold text-gray-700 text-lg">第${level.id}关</div>
                            <div class="text-gray-500 text-xs sm:text-sm mb-2 truncate">${level.topic}</div>
                            <div class="flex gap-1 justify-center">${starsHtml}</div>
                        </div>
                        ${isLocked ? '<div class="absolute inset-0 flex items-center justify-center bg-black/10 rounded-2xl"><span class="text-3xl">🔒</span></div>' : ''}
                    </div>
                `;

                if (!isLocked) {
                    card.onclick = () => startLevel(level.id);
                }

                container.appendChild(card);
            });
        }

        function updateHeader() {
            document.getElementById('streak-display').innerText = `${STATE.streak}天`;
            document.getElementById('global-progress-text').innerText = `${STATE.totalLearned} / 500`;
            const percent = Math.min(100, (STATE.totalLearned / 500) * 100);
            document.getElementById('global-progress-bar').style.width = `${percent}%`;
            
            const wrongCount = STATE.wrongBook.length;
            document.getElementById('wrong-count-badge').innerText = wrongCount;
            document.getElementById('wrong-count-badge').classList.toggle('hidden', wrongCount === 0);
        }

        function showMap() {
            hideAllViews();
            document.getElementById('view-map').classList.remove('hidden');
            renderMap();
            updateHeader();
        }

        function hideAllViews() {
            ['view-learning', 'view-map', 'view-wrongbook'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.add('hidden');
                el.classList.remove('flex');
            });
            document.getElementById('completion-modal').classList.add('hidden');
        }

        function startLevel(levelId) {
            STATE.currentLevel = levelId;
            STATE.currentSentenceIndex = 0;
            
            if (!STATE.levelProgress[levelId]) {
                STATE.levelProgress[levelId] = { stars: 0, completed: false, correctCount: 0 };
            }

            const levelInfo = LEVELS_CONFIG.find(l => l.id === levelId);
            document.getElementById('header-level-name').innerText = `第${levelId}关`;
            document.getElementById('header-level-topic').innerText = levelInfo.topic;
            document.getElementById('level-stars').innerText = STATE.levelProgress[levelId].stars;

            hideAllViews();
            const learningView = document.getElementById('view-learning');
            learningView.classList.remove('hidden');
            learningView.classList.add('flex');
            
            loadSentence();
        }

        // ==========================================
        // 4. 错题本逻辑 (Wrong Book Logic)
        // ==========================================

        function showWrongBook() {
            hideAllViews();
            const wb = document.getElementById('view-wrongbook');
            wb.classList.remove('hidden');
            wb.classList.add('flex');
            renderWrongBookList();
        }

        function renderWrongBookList() {
            const container = document.getElementById('wrong-list-container');
            const emptyState = document.getElementById('wrong-empty-state');
            container.innerHTML = '';

            if (STATE.wrongBook.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            [...STATE.wrongBook].reverse().forEach((item, index) => {
                const realIndex = STATE.wrongBook.length - 1 - index;
                const levelName = LEVELS_CONFIG.find(l => l.id === item.levelId)?.topic || `第${item.levelId}关`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl p-4 shadow-md border-l-4 border-red-400 flex flex-col justify-between animate-pop";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded">${levelName}</span>
                            <span class="text-xs text-gray-400">${new Date(item.date).toLocaleDateString()}</span>
                        </div>
                        <div class="text-lg font-bold text-gray-800 mb-1">${item.sentence.c}</div>
                        <div class="text-sm text-gray-500 font-mono mb-2">${item.sentence.j}</div>
                        <div class="text-gray-600 text-sm bg-gray-50 p-2 rounded">意思：${item.sentence.m}</div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="playWrongAudio(${realIndex})" class="flex-1 py-2 bg-blue-50 text-blue-600 rounded-lg font-bold text-sm hover:bg-blue-100 btn-active flex items-center justify-center gap-1">
                            <span>🔊</span> 重听
                        </button>
                        <button onclick="removeWrongItem(${realIndex})" class="flex-1 py-2 bg-green-50 text-green-600 rounded-lg font-bold text-sm hover:bg-green-100 btn-active flex items-center justify-center gap-1">
                            <span>✅</span> 已掌握
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function playWrongAudio(index) {
            const item = STATE.wrongBook[index];
            if(item) speakText(item.sentence.c);
        }

        function removeWrongItem(index) {
            STATE.wrongBook.splice(index, 1);
            saveData();
            renderWrongBookList();
        }

        // ==========================================
        // 5. 核心学习流程 (Learning Flow)
        // ==========================================

        function loadSentence() {
            const sentences = generateSentences(STATE.currentLevel);
            
            if (STATE.currentSentenceIndex >= sentences.length) {
                finishLevel();
                return;
            }

            const sentence = sentences[STATE.currentSentenceIndex];
            
            // 重置界面
            document.getElementById('listening-feedback').classList.add('hidden');
            document.getElementById('listening-feedback').className = "hidden mt-4 sm:mt-6 w-full p-3 sm:p-4 rounded-xl flex items-center justify-center gap-2 sm:gap-3 font-bold text-base sm:text-lg";
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // 随机选项
            let allOptions = [
                { text: sentence.m, correct: true },
                ...sentence.d.map(text => ({ text, correct: false }))
            ];
            allOptions.sort(() => Math.random() - 0.5);

            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                // 增加高度和字体大小以适应手机
                btn.className = "bg-white hover:bg-blue-50 border-2 border-gray-100 hover:border-blue-200 p-4 rounded-xl text-lg font-medium text-gray-700 shadow-sm transition-all btn-active h-20 flex items-center justify-center";
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(opt.correct, btn, sentence);
                optionsContainer.appendChild(btn);
            });

            // 【关键】自动播放逻辑
            // 由于是从地图点击进入的，浏览器允许自动播放
            setTimeout(() => {
                playCurrentAudio();
            }, 300);
        }

        function playCurrentAudio() {
            const sentences = generateSentences(STATE.currentLevel);
            const sentence = sentences[STATE.currentSentenceIndex];
            speakText(sentence.c);
        }

        // 统一的语音播放函数
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // 取消当前正在播放的，防止重叠
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK'; // 粤语
                utterance.rate = 0.9;
                
                // 错误处理：如果播放失败（如手机静音或无粤语包），不报错，静默失败或提示
                utterance.onerror = (e) => {
                    console.warn("Speech synthesis error:", e);
                    // 可选：显示一个小提示 "请检查手机音量"
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert(`请跟读：${text}`);
            }
        }

        function handleAnswer(isCorrect, btnElement, sentenceObj) {
            const allBtns = document.querySelectorAll('#options-container button');
            allBtns.forEach(b => b.disabled = true); // 锁定所有按钮

            const feedbackEl = document.getElementById('listening-feedback');
            feedbackEl.classList.remove('hidden');

            if (isCorrect) {
                // 正确样式
                btnElement.classList.remove('bg-white', 'border-gray-100');
                btnElement.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                
                feedbackEl.classList.add('bg-green-100', 'text-green-700');
                feedbackEl.innerHTML = '<span class="text-xl">✅</span> 答对了！真棒！';
                
                STATE.levelProgress[STATE.currentLevel].correctCount++;
                
                // 延迟后进入下一题
                setTimeout(() => {
                    STATE.currentSentenceIndex++;
                    // 记录总进度
                    STATE.totalLearned++;
                    saveData();
                    loadSentence(); // 加载下一题会自动播放
                }, 1000);
            } else {
                // 错误样式
                btnElement.classList.remove('bg-white', 'border-gray-100');
                btnElement.classList.add('bg-red-100', 'border-red-500', 'text-red-700', 'animate-shake');
                
                feedbackEl.classList.add('bg-red-100', 'text-red-700');
                feedbackEl.innerHTML = '<span class="text-xl">❌</span> 已加入错题本，再听一次！';
                
                // 加入错题本
                addToWrongBook(STATE.currentLevel, sentenceObj);

                // 错误后：重播声音，不跳过，让学生重新选（或者你可以选择跳过）
                // 这里选择：2 秒后重新加载本题，让学生再试一次
                setTimeout(() => {
                    loadSentence(); 
                }, 2000);
            }
        }

        function addToWrongBook(levelId, sentence) {
            const exists = STATE.wrongBook.some(item => item.sentence.c === sentence.c && item.levelId === levelId);
            if (!exists) {
                STATE.wrongBook.push({
                    id: Date.now(),
                    levelId: levelId,
                    sentence: sentence,
                    date: new Date().toISOString()
                });
                saveData();
            }
        }

        function finishLevel() {
            const progress = STATE.levelProgress[STATE.currentLevel];
            const totalSentences = generateSentences(STATE.currentLevel).length;
            
            // 简化评分逻辑：只看正确率
            let stars = 1;
            const accuracy = progress.correctCount / totalSentences;
            if (accuracy >= 0.8) stars = 2;
            if (accuracy === 1) stars = 3;
            
            if (stars > progress.stars) {
                progress.stars = stars;
                progress.completed = true;
                saveData();
            }

            document.getElementById('modal-stars').innerHTML = '⭐'.repeat(stars) + '<span class="text-gray-300">' + '⭐'.repeat(3-stars) + '</span>';
            document.getElementById('modal-sentences').innerText = `${totalSentences} 句`;
            document.getElementById('modal-total').innerText = `${STATE.totalLearned}/500`;
            
            document.getElementById('completion-modal').classList.remove('hidden');
            
            // 播放胜利音效 (简单蜂鸣)
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.5, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {}
        }

        // 启动应用
        initApp();
		// 注册 Service Worker
		if ('serviceWorker' in navigator) {
		  window.addEventListener('load', () => {
			navigator.serviceWorker.register('./sw.js')
			  .then(reg => console.log('Service Worker registered:', reg))
			  .catch(err => console.error('SW registration failed:', err));
		  });
		}
    </script>
</body>
</html>
