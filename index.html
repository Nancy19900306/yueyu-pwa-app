		.progress-label span:last-child {
			color: #fbbf24;

		.progress-bar-fill {
			background: linear-gradient(90deg, #f59e0b, #ef4444, #ec4899, #8b5cf6);
			background-size: 200% 100%;
			animation: gradientMove 2s ease infinite;
			border-radius: 10px;
			height: 100%;
			transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
			position: relative;
			overflow: hidden;
		}

		.progress-bar-fill::after {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
			animation: shimmer 1.5s infinite;
		}

		@keyframes gradientMove {
			0% { background-position: 0% 0%; }
			100% { background-position: 200% 0%; }
		}

		@keyframes shimmer {
			0% { transform: translateX(-100%); }

    <script>
    // ==========================================
    // 1. ж•°жҚ®е®ҡд№ү
    // ==========================================
    
    const LEVELS_CONFIG = [
        { id: 1, topic: "еҹәзЎҖй—®еҖҷ", icon: "рҹ‘Ӣ", color: "from-blue-500 to-blue-600" },
        { id: 2, topic: "зӨјиІҢз”ЁиҜӯ", icon: "рҹҷҸ", color: "from-red-500 to-red-600" },
        { id: 3, topic: "йҘ®йЈҹзӮ№йӨҗ", icon: "рҹҚң", color: "from-orange-500 to-orange-600" },
        { id: 4, topic: "иҙӯзү©й—®д»·", icon: "рҹ’°", color: "from-purple-500 to-purple-600" },
        { id: 5, topic: "дәӨйҖҡеҮәиЎҢ", icon: "рҹҡҢ", color: "from-indigo-500 to-indigo-600" },
        { id: 6, topic: "й—®и·ҜжұӮеҠ©", icon: "рҹ—әпёҸ", color: "from-cyan-500 to-cyan-600" },
        { id: 7, topic: "ж—¶й—ҙж•°еӯ—", icon: "вҸ°", color: "from-teal-500 to-teal-600" },
        { id: 8, topic: "зҙ§жҖҘжғ…еҶө", icon: "вҡ пёҸ", color: "from-red-500 to-red-600" },
        { id: 9, topic: "ж Ўеӣӯз”ҹжҙ»", icon: "рҹҺ’", color: "from-blue-500 to-blue-600" },
        { id: 10, topic: "жғ…ж„ҹж—Ҙеёё", icon: "рҹҳҠ", color: "from-yellow-500 to-yellow-600" }
    ];

    function getSentencesByLevel(levelId) {
        if (typeof CANTONESE_FULL_DB !== 'undefined' && CANTONESE_FULL_DB[levelId]) {
            return CANTONESE_FULL_DB[levelId];
        }
        let sentences = [];
        for(let i = 1; i <= 5; i++) {
            sentences.push({
                c: `з¬¬${levelId}е…іеҸҘеӯҗ${i}`,
                j: `dei6 ${levelId} gun1 cou3 zi5 ${i}`,
                m: `иҝҷжҳҜз¬¬${levelId}е…ізҡ„з¬¬${i}дёӘз»ғд№ еҸҘ`,
                d: [`й”ҷиҜҜйҖүйЎ№ A`, `й”ҷиҜҜйҖүйЎ№ B`, `й”ҷиҜҜйҖүйЎ№ C`]
            });
        }
        return sentences;
    }

    function generateSentences(levelId) {
        return getSentencesByLevel(levelId);
    }

    // ==========================================
    // 2. зҠ¶жҖҒз®ЎзҗҶ
    // ==========================================
    
    const STATE = {
        currentLevel: 1,
        currentSentenceIndex: 0,
        streak: 0,
        lastLoginDate: null,
        levelProgress: {},
        totalLearned: 0,
        wrongBook: []
    };

    function initApp() {
        loadData();
        checkStreak();
        renderMap();
        updateHeader();
    }

    function loadData() {
        const saved = localStorage.getItem('cantoneseHeroData');
        if (saved) {
            const parsed = JSON.parse(saved);
            Object.assign(STATE, parsed);
        }
        for (let i = 1; i <= 10; i++) {
            if (!STATE.levelProgress[i]) {
                STATE.levelProgress[i] = { stars: 0, completed: false, correctCount: 0 };
            }
        }
    }

    function saveData() {
        localStorage.setItem('cantoneseHeroData', JSON.stringify(STATE));
        updateHeader();
    }

    function checkStreak() {
        const today = new Date().toDateString();
        if (STATE.lastLoginDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (STATE.lastLoginDate === yesterday.toDateString()) {
                STATE.streak++;
            } else if (STATE.lastLoginDate !== today) {
                STATE.streak = 1;
            }
            STATE.lastLoginDate = today;
            saveData();
        }
    }

    // ==========================================
    // 3. и§ҶеӣҫжёІжҹ“
    // ==========================================

    function renderMap() {
        const container = document.getElementById('map-grid');
        if (!container) return;
        container.innerHTML = '';

        LEVELS_CONFIG.forEach((level, index) => {
            const progress = STATE.levelProgress[level.id] || { stars: 0, completed: false };
            const isLocked = index > 0 && !STATE.levelProgress[LEVELS_CONFIG[index-1].id]?.completed;
            
            const card = document.createElement('div');
            card.className = `level-card cursor-pointer transition-all duration-300 ${isLocked ? 'opacity-40 grayscale pointer-events-none' : 'hover:scale-105'}`;
            
            let starsHtml = '';
            for(let i=1; i<=3; i++) {
                starsHtml += `<span class="text-${i <= progress.stars ? 'yellow-400' : 'gray-300'} text-sm">вӯҗ</span>`;
            }

            card.innerHTML = `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20 h-36 flex flex-col items-center justify-between">
                    <div class="w-14 h-14 bg-gradient-to-r ${level.color} rounded-full flex items-center justify-center text-2xl shadow-lg animate-float">
                        ${level.icon}
                    </div>
                    <div class="text-center">
                        <div class="font-bold text-white text-base">${level.topic}</div>
                        <div class="flex gap-0.5 justify-center mt-1">${starsHtml}</div>
                    </div>
                    ${isLocked ? '<div class="absolute inset-0 flex items-center justify-center bg-black/30 rounded-2xl"><span class="text-2xl">рҹ”’</span></div>' : ''}
                </div>
            `;

            if (!isLocked) {
                card.onclick = () => startLevel(level.id);
            }
            container.appendChild(card);
        });
    }

    function updateHeader() {
        const globalProgressText = document.getElementById('global-progress-text');
        const globalProgressBar = document.getElementById('global-progress-bar');
        const wrongCountBadge = document.getElementById('wrong-count-badge');
        
        if (globalProgressText) globalProgressText.innerText = `${STATE.totalLearned} / 500`;
        const percent = Math.min(100, (STATE.totalLearned / 500) * 100);
        if (globalProgressBar) globalProgressBar.style.width = `${percent}%`;
        
        const wrongCount = STATE.wrongBook.length;
        if (wrongCountBadge) {
            wrongCountBadge.innerText = wrongCount;
            wrongCountBadge.classList.toggle('hidden', wrongCount === 0);
        }
    }

    function showMap() {
        hideAllViews();
        const viewMap = document.getElementById('view-map');
        if (viewMap) viewMap.classList.remove('hidden');
        renderMap();
        updateHeader();
    }

	
	function hideAllViews() {
    ['view-learning', 'view-map', 'view-wrongbook', 'view-allwords'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('hidden');
            el.classList.remove('flex');
        }
    });
    const completionModal = document.getElementById('completion-modal');
    if (completionModal) completionModal.classList.add('hidden');
}
	

    function startLevel(levelId) {
    STATE.currentLevel = levelId;
    STATE.currentSentenceIndex = 0;
    
    if (!STATE.levelProgress[levelId]) {
        STATE.levelProgress[levelId] = { stars: 0, completed: false, correctCount: 0 };
    }

    const levelInfo = LEVELS_CONFIG.find(l => l.id === levelId);
    const headerLevelName = document.getElementById('header-level-name');
    const headerLevelTopic = document.getElementById('header-level-topic');
    
    if (headerLevelName) headerLevelName.innerText = `з¬¬${levelId}е…і`;
    if (headerLevelTopic) headerLevelTopic.innerText = levelInfo.topic;

    // йҮҚзҪ®иҝӣеәҰжқЎе®№еҷЁ
    const oldContainer = document.getElementById('level-progress-container');
    if (oldContainer) oldContainer.remove();

    hideAllViews();
    const learningView = document.getElementById('view-learning');
    if (learningView) {
        learningView.classList.remove('hidden');
        learningView.classList.add('flex');
    }
    
    loadSentence();
}

    // ==========================================
    // 4. зІӨиҜӯйҹійў‘ж’ӯж”ҫ
    // ==========================================
    
    let audioCache = new Map();
    let audioIndexLoaded = false;

    async function loadAudioIndex() {
        if (audioIndexLoaded) return;
        try {
            const response = await fetch('./audio/index.json');
            const index = await response.json();
            for (const level of Object.values(index.levels)) {
                for (const item of level) {
                    const audio = new Audio();
                    audio.src = `./audio/${item.filename}`;
                    audio.preload = 'auto';
                    audioCache.set(item.text, audio);
                }
            }
            audioIndexLoaded = true;
            console.log(`вң… е·ІеҠ иҪҪ ${audioCache.size} дёӘзІӨиҜӯйҹійў‘`);
        } catch(e) {
            console.warn('еҠ иҪҪйҹійў‘зҙўеј•еӨұиҙҘ', e);
        }
    }

    async function speakText(text) {
        if (!text) return;
        if (!audioIndexLoaded) await loadAudioIndex();
        
        const audio = audioCache.get(text);
        if (audio) {
            audio.currentTime = 0;
            try {
                await audio.play();
                console.log('ж’ӯж”ҫжҲҗеҠҹ:', text);
                return;
            } catch(e) {}
        }
        
        try {
            const url = `https://edge-tts.vercel.app/api/tts?text=${encodeURIComponent(text)}&voice=zh-HK-HiuMaanNeural`;
            const fallbackAudio = new Audio();
            fallbackAudio.src = url;
            await fallbackAudio.play();
        } catch(e) {}
    }

    async function playCurrentAudio() {
        const sentences = getSentencesByLevel(STATE.currentLevel);
        const sentence = sentences[STATE.currentSentenceIndex];
        if (!sentence) return;
        
        const playBtn = document.querySelector('#stage-listening .play-btn');
        if (playBtn) {
            playBtn.classList.add('scale-95');
            setTimeout(() => playBtn.classList.remove('scale-95'), 200);
        }
        await speakText(sentence.c);
    }

    async function playWrongAudio(index) {
        const item = STATE.wrongBook[index];
        if (item) await speakText(item.sentence.c);
    }

    loadAudioIndex();

    // ==========================================
    // 5. й”ҷйўҳжң¬йҖ»иҫ‘
    // ==========================================

    function showWrongBook() {
        hideAllViews();
        const wb = document.getElementById('view-wrongbook');
        if (wb) {
            wb.classList.remove('hidden');
            wb.classList.add('flex');
        }
        renderWrongBookList();
    }

    function renderWrongBookList() {
        const container = document.getElementById('wrong-list-container');
        const emptyState = document.getElementById('wrong-empty-state');
        if (!container) return;
        container.innerHTML = '';

        if (STATE.wrongBook.length === 0) {
            if (emptyState) emptyState.classList.remove('hidden');
            return;
        }
        if (emptyState) emptyState.classList.add('hidden');

        [...STATE.wrongBook].reverse().forEach((item, index) => {
            const realIndex = STATE.wrongBook.length - 1 - index;
            const levelName = LEVELS_CONFIG.find(l => l.id === item.levelId)?.topic || `з¬¬${item.levelId}е…і`;

            const card = document.createElement('div');
            card.className = "bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20 animate-pop";
            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs font-bold text-red-400 bg-red-500/20 px-2 py-1 rounded">${levelName}</span>
                    <span class="text-xs text-white/50">${new Date(item.date).toLocaleDateString()}</span>
                </div>
                <div class="text-lg font-bold text-white mb-1">${item.sentence.c}</div>
                <div class="text-sm text-white/50 font-mono mb-2">${item.sentence.j}</div>
                <div class="text-white/70 text-sm bg-white/5 p-2 rounded">${item.sentence.m}</div>
                <div class="mt-4 flex gap-2">
                    <button onclick="playWrongAudio(${realIndex})" class="flex-1 py-2 bg-blue-500/20 text-blue-300 rounded-lg font-bold text-sm hover:bg-blue-500/30 btn-active">рҹ”Ҡ йҮҚеҗ¬</button>
                    <button onclick="removeWrongItem(${realIndex})" class="flex-1 py-2 bg-green-500/20 text-green-300 rounded-lg font-bold text-sm hover:bg-green-500/30 btn-active">вң… е·ІжҺҢжҸЎ</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function removeWrongItem(index) {
        STATE.wrongBook.splice(index, 1);
        saveData();
        renderWrongBookList();
    }





    // ==========================================
    // 6. ж ёеҝғеӯҰд№ жөҒзЁӢ
    // ==========================================

 function loadSentence() {
		const sentences = getSentencesByLevel(STATE.currentLevel);
		
		if (STATE.currentSentenceIndex >= sentences.length) {
			finishLevel();
			return;
		}

		const sentence = sentences[STATE.currentSentenceIndex];
		
		// ========== ж·»еҠ иҝӣеәҰжқЎ ==========
		const totalInLevel = sentences.length;
		const currentIndex = STATE.currentSentenceIndex;
		const progressPercent = (currentIndex / totalInLevel) * 100;
		
		const glassCard = document.querySelector('#stage-listening .glass-card');
		if (glassCard) {
			let progressContainer = document.getElementById('level-progress-container');
			
			if (!progressContainer) {
				progressContainer = document.createElement('div');
				progressContainer.id = 'level-progress-container';
				progressContainer.className = 'progress-wrapper w-full';
				progressContainer.innerHTML = `
					<div class="progress-label">
						<span>рҹҺҜ й—Ҝе…іиҝӣеәҰ</span>
						<span id="level-progress-text">0 / ${totalInLevel}</span>
					</div>
					<div class="progress-bar-bg">
						<div class="progress-bar-fill" id="level-progress-bar" style="width: 0%"></div>
					</div>
				`;
				
				const playDiv = glassCard.querySelector('.mb-6.sm\\:mb-8');
				if (playDiv) {
					glassCard.insertBefore(progressContainer, playDiv);
				} else {
					const h2Element = glassCard.querySelector('h2');
					if (h2Element) {
						h2Element.insertAdjacentElement('afterend', progressContainer);
					}
				}
			}
			
			const progressText = document.getElementById('level-progress-text');
			const progressBar = document.getElementById('level-progress-bar');
			if (progressText) progressText.innerText = `${currentIndex} / ${totalInLevel}`;
			if (progressBar) progressBar.style.width = `${progressPercent}%`;
		}
		// ========== иҝӣеәҰжқЎд»Јз Ғз»“жқҹ ==========
		
		const feedbackEl = document.getElementById('listening-feedback');
		if (feedbackEl) {
			feedbackEl.classList.add('hidden');
		}
		
		const optionsContainer = document.getElementById('options-container');
		if (!optionsContainer) return;
		optionsContainer.innerHTML = '';
		
		const otherSentences = sentences.filter(s => s.c !== sentence.c);
		const randomOthers = [...otherSentences].sort(() => Math.random() - 0.5).slice(0, 3);
		
		let allOptions = [
			{ text: sentence.m, correct: true },
			...randomOthers.map(s => ({ text: s.m, correct: false }))
		];
		allOptions.sort(() => Math.random() - 0.5);

		allOptions.forEach(opt => {
			const btn = document.createElement('button');
			btn.className = "option-btn p-4 rounded-xl text-base font-medium transition-all h-16 flex items-center justify-center";
			btn.innerText = opt.text;
			btn.onclick = () => handleAnswer(opt.correct, btn, sentence);
			optionsContainer.appendChild(btn);
		});

		setTimeout(() => {
			playCurrentAudio();
		}, 300);
	}

    function handleAnswer(isCorrect, btnElement, sentenceObj) {
        const allBtns = document.querySelectorAll('#options-container button');
        allBtns.forEach(b => b.disabled = true);
        const feedbackEl = document.getElementById('listening-feedback');
        
        if (isCorrect) {
            btnElement.classList.add('correct');
            STATE.levelProgress[STATE.currentLevel].correctCount++;
            setTimeout(() => {
                STATE.currentSentenceIndex++;
                STATE.totalLearned++;
                saveData();
                loadSentence();
            }, 300);
        } else {
            btnElement.classList.add('wrong', 'animate-shake');
            if (feedbackEl) {
                feedbackEl.classList.remove('hidden');
                feedbackEl.className = "mt-4 w-full p-3 rounded-xl flex items-center justify-center gap-2 font-bold text-base bg-red-500/20 text-red-300";
                feedbackEl.innerHTML = '<span>вқҢ</span> зӯ”й”ҷдәҶпјҢе·ІеҠ е…Ҙй”ҷйўҳжң¬';
            }
            addToWrongBook(STATE.currentLevel, sentenceObj);
            setTimeout(() => loadSentence(), 2000);
        }
    }

    function addToWrongBook(levelId, sentence) {
        const exists = STATE.wrongBook.some(item => item.sentence.c === sentence.c && item.levelId === levelId);
        if (!exists) {
            STATE.wrongBook.push({
                id: Date.now(),
                levelId: levelId,
                sentence: sentence,
                date: new Date().toISOString()
            });
            saveData();
        }
    }

    function finishLevel() {
        const progress = STATE.levelProgress[STATE.currentLevel];
        const totalSentences = getSentencesByLevel(STATE.currentLevel).length;
        
        let stars = 1;
        const accuracy = progress.correctCount / totalSentences;
        if (accuracy >= 0.8) stars = 2;
        if (accuracy === 1) stars = 3;
        
        if (stars > progress.stars) {
            progress.stars = stars;
            progress.completed = true;
            saveData();
        }

        document.getElementById('modal-stars').innerHTML = 'вӯҗ'.repeat(stars) + 'вӯҗ'.repeat(3-stars);
        document.getElementById('modal-sentences').innerText = `${totalSentences} еҸҘ`;
        document.getElementById('modal-total').innerText = `${STATE.totalLearned}/500`;
        document.getElementById('completion-modal').classList.remove('hidden');
        
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046.5, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        } catch (e) {}
    }
	
	
	// ==========================================
	// 7. е…ЁйғЁиҜҚжұҮеҠҹиғҪ
	// ==========================================

	let currentFilterLevel = 0; // 0=е…ЁйғЁ, 1-10=е…·дҪ“е…іеҚЎ

	function showAllWords() {
		hideAllViews();
		const allWordsView = document.getElementById('view-allwords');
		if (allWordsView) {
			allWordsView.classList.remove('hidden');
			allWordsView.classList.add('flex');
		}
		renderLevelFilter();
		renderAllWords();
	}

	function renderLevelFilter() {
		const filterContainer = document.getElementById('level-filter');
		if (!filterContainer) return;
		
		filterContainer.innerHTML = `
			<button onclick="filterByLevel(0)" class="px-4 py-2 rounded-full text-sm font-medium transition-all ${currentFilterLevel === 0 ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-lg' : 'bg-white/10 text-white/70 hover:bg-white/20'}">
				рҹ“– е…ЁйғЁ
			</button>
		`;
		
		for (let i = 1; i <= 10; i++) {
			const levelInfo = LEVELS_CONFIG.find(l => l.id === i);
			filterContainer.innerHTML += `
				<button onclick="filterByLevel(${i})" class="px-4 py-2 rounded-full text-sm font-medium transition-all ${currentFilterLevel === i ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-lg' : 'bg-white/10 text-white/70 hover:bg-white/20'}">
					${levelInfo.icon} ${levelInfo.topic}
				</button>
			`;
		}
	}

	function filterByLevel(levelId) {
		currentFilterLevel = levelId;
		renderLevelFilter();
		renderAllWords();
	}

	function renderAllWords() {
		const container = document.getElementById('all-words-container');
		const emptyState = document.getElementById('all-words-empty');
		if (!container) return;
		
		let allSentences = [];
		
		if (currentFilterLevel === 0) {
			// е…ЁйғЁе…іеҚЎ
			for (let i = 1; i <= 10; i++) {
				const sentences = getSentencesByLevel(i);
				allSentences.push(...sentences.map(s => ({ ...s, levelId: i, levelName: LEVELS_CONFIG.find(l => l.id === i)?.topic })));
			}
		} else {
			// еҚ•дёӘе…іеҚЎ
			const sentences = getSentencesByLevel(currentFilterLevel);
			allSentences = sentences.map(s => ({ 
				...s, 
				levelId: currentFilterLevel, 
				levelName: LEVELS_CONFIG.find(l => l.id === currentFilterLevel)?.topic 
			}));
		}
		
		if (allSentences.length === 0) {
			if (emptyState) emptyState.classList.remove('hidden');
			container.innerHTML = '';
			return;
		}
		
		if (emptyState) emptyState.classList.add('hidden');
		
		container.innerHTML = '';
		
		allSentences.forEach((item, index) => {
			const isWrong = STATE.wrongBook.some(w => w.sentence.c === item.c && w.levelId === item.levelId);
			
			const card = document.createElement('div');
			card.className = "bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20 animate-slide-up";
			card.style.animationDelay = `${index * 0.02}s`;
			card.innerHTML = `
				<div class="flex justify-between items-start mb-2">
					<span class="text-xs font-bold text-purple-400 bg-purple-500/20 px-2 py-1 rounded">${item.levelName}</span>
					${isWrong ? '<span class="text-xs text-red-400 bg-red-500/20 px-2 py-1 rounded">вқҢ й”ҷйўҳ</span>' : '<span class="text-xs text-green-400 bg-green-500/20 px-2 py-1 rounded">вң… жңӘй”ҷ</span>'}
				</div>
				<div class="text-lg font-bold text-white mb-1">${item.c}</div>
				<div class="text-sm text-white/50 font-mono mb-2">${item.j || 'еҸ‘йҹіеҫ…иЎҘе……'}</div>
				<div class="text-white/70 text-sm bg-white/5 p-2 rounded">${item.m}</div>
				<div class="mt-4 flex gap-2">
					<button onclick="playWordAudio('${item.c.replace(/'/g, "\\'")}')" class="flex-1 py-2 bg-blue-500/20 text-blue-300 rounded-lg font-bold text-sm hover:bg-blue-500/30 btn-active flex items-center justify-center gap-1">
						<span>рҹ”Ҡ</span> еҸ‘йҹі
					</button>
					${isWrong ? 
						`<button onclick="removeFromWrongBookDirect('${item.c.replace(/'/g, "\\'")}', ${item.levelId})" class="flex-1 py-2 bg-green-500/20 text-green-300 rounded-lg font-bold text-sm hover:bg-green-500/30 btn-active flex items-center justify-center gap-1">
							<span>вң…</span> д»Һй”ҷйўҳз§»йҷӨ
						</button>` : 
						`<button onclick="addToWrongBookDirect('${item.c.replace(/'/g, "\\'")}', ${item.levelId})" class="flex-1 py-2 bg-yellow-500/20 text-yellow-300 rounded-lg font-bold text-sm hover:bg-yellow-500/30 btn-active flex items-center justify-center gap-1">
							<span>вҡ пёҸ</span> еҠ е…Ҙй”ҷйўҳ
						</button>`
					}
				</div>
			`;
			container.appendChild(card);
		});
	}

	// ж’ӯж”ҫеҚ•иҜҚеҸ‘йҹі
	async function playWordAudio(text) {
		await speakText(text);
	}

	// зӣҙжҺҘд»Һе…ЁйғЁиҜҚжұҮеҠ е…Ҙй”ҷйўҳжң¬
	function addToWrongBookDirect(text, levelId) {
		// жҹҘжүҫе®Ңж•ҙзҡ„еҸҘеӯҗеҜ№иұЎ
		const sentences = getSentencesByLevel(levelId);
		const sentence = sentences.find(s => s.c === text);
		
		if (sentence) {
			const exists = STATE.wrongBook.some(item => item.sentence.c === sentence.c && item.levelId === levelId);
			if (!exists) {
				STATE.wrongBook.push({
					id: Date.now(),
					levelId: levelId,
					sentence: sentence,
					date: new Date().toISOString()
				});
				saveData();
				renderAllWords(); // еҲ·ж–°еҪ“еүҚи§Ҷеӣҫ
				renderWrongBookList(); // еҗҢж—¶еҲ·ж–°й”ҷйўҳжң¬
				showToast('вң… е·ІеҠ е…Ҙй”ҷйўҳжң¬');
			} else {
				showToast('вҡ пёҸ е·ІеңЁй”ҷйўҳжң¬дёӯ');
			}
		}
	}

	// зӣҙжҺҘд»Һе…ЁйғЁиҜҚжұҮз§»еҮәй”ҷйўҳжң¬
	function removeFromWrongBookDirect(text, levelId) {
		const index = STATE.wrongBook.findIndex(item => item.sentence.c === text && item.levelId === levelId);
		if (index !== -1) {
			STATE.wrongBook.splice(index, 1);
			saveData();
			renderAllWords(); // еҲ·ж–°еҪ“еүҚи§Ҷеӣҫ
			renderWrongBookList(); // еҗҢж—¶еҲ·ж–°й”ҷйўҳжң¬
			showToast('рҹҺү е·Ід»Һй”ҷйўҳжң¬з§»йҷӨ');
		}
	}

	// жҳҫзӨәжҸҗзӨәж¶ҲжҒҜ
	function showToast(message) {
		const toast = document.createElement('div');
		toast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-black/80 backdrop-blur-sm text-white px-4 py-2 rounded-full text-sm z-50 animate-slide-up';
		toast.innerText = message;
		document.body.appendChild(toast);
		setTimeout(() => toast.remove(), 2000);
	}
	

    initApp();
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.error('SW failed:', err));
        });
    }
    </script>
