<head>

    <style>
        /* 基础设置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
            background-color: #F0F7F4; /* 护眼浅青绿 */
            user-select: none; /* 防止误选文本 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* 优化触摸响应 */
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 动画定义 */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes fire-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-fire { animation: fire-pulse 1s infinite; }

        /* 按钮点击反馈 */
        .btn-active:active { transform: scale(0.96); }
        
        /* 玻璃拟态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col text-gray-700">

        <!-- 视图 1: 关卡地图 -->

            <!-- 核心卡片容器 -->

                <!-- 听力挑战卡片 -->

            <div class="flex items-center justify-between mb-4 sm:mb-6">
                <button onclick="showMap()" class="bg-white hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-xl shadow-md font-bold flex items-center gap-2 btn-active transition-all text-sm sm:text-base">
                    <span>⬅️</span> 返回

            <div class="flex-1 overflow-y-auto no-scrollbar pb-10">

    </main>

 <!-- ================= JavaScript 逻辑 ================= -->
 <script>
    // ==========================================
    // 1. 数据定义 (Data Structure)
    // ==========================================
    
    const LEVELS_CONFIG = [
        { id: 1, topic: "基础问候", icon: "👋", color: "blue" },
        { id: 2, topic: "礼貌用语", icon: "🙏", color: "red" },
        { id: 3, topic: "饮食点餐", icon: "🍜", color: "orange" },
        { id: 4, topic: "购物问价", icon: "💰", color: "purple" },
        { id: 5, topic: "交通出行", icon: "🚌", color: "indigo" },
        { id: 6, topic: "问路求助", icon: "🗺️", color: "cyan" },
        { id: 7, topic: "时间与数字", icon: "⏰", color: "teal" },
        { id: 8, topic: "紧急情况", icon: "⚠️", color: "red" },
        { id: 9, topic: "校园生活", icon: "🎒", color: "blue" },
        { id: 10, topic: "情感日常", icon: "😊", color: "yellow" }
    ];

    // 获取句子（从 CANTONESE_FULL_DB 读取）
    function getSentencesByLevel(levelId) {
        if (typeof CANTONESE_FULL_DB !== 'undefined' && CANTONESE_FULL_DB[levelId]) {
            return CANTONESE_FULL_DB[levelId];
        }
        // 备用：生成模拟数据
        let sentences = [];
        for(let i = 1; i <= 5; i++) {
            sentences.push({
                c: `第${levelId}关句子${i}`,
                j: `dei6 ${levelId} gun1 cou3 zi5 ${i}`,
                m: `这是第${levelId}关的第${i}个练习句`,
                d: [`错误选项 A`, `错误选项 B`, `错误选项 C`]
            });
        }
        return sentences;
    }
	

    // 为了兼容原有代码
    function generateSentences(levelId) {
        return getSentencesByLevel(levelId);
    }

    // ==========================================
    // 2. 状态管理 (State Management)
    // ==========================================
    
    const STATE = {
        currentLevel: 1,
        currentSentenceIndex: 0,
        streak: 0,
        lastLoginDate: null,
        levelProgress: {},
        totalLearned: 0,
        wrongBook: []
    };

    function initApp() {
        loadData();
        checkStreak();
        renderMap();
        updateHeader();
    }

    function loadData() {
        const saved = localStorage.getItem('cantoneseHeroData');
        if (saved) {
            const parsed = JSON.parse(saved);
            Object.assign(STATE, parsed);
        }
        // 确保每个关卡都有进度记录
        for (let i = 1; i <= 10; i++) {
            if (!STATE.levelProgress[i]) {
                STATE.levelProgress[i] = { stars: 0, completed: false, correctCount: 0 };
            }
        }
    }

    function saveData() {
        localStorage.setItem('cantoneseHeroData', JSON.stringify(STATE));
        updateHeader();
    }

    function checkStreak() {
        const today = new Date().toDateString();
        if (STATE.lastLoginDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (STATE.lastLoginDate === yesterday.toDateString()) {
                STATE.streak++;
            } else if (STATE.lastLoginDate !== today) {
                STATE.streak = 1;
            }
            STATE.lastLoginDate = today;
            saveData();
        }
    }

    // ==========================================
    // 3. 视图渲染 (Rendering)
    // ==========================================

    function renderMap() {
        const container = document.querySelector('#view-map .grid');
        if (!container) return;
        container.innerHTML = '';

        LEVELS_CONFIG.forEach((level, index) => {
            const progress = STATE.levelProgress[level.id] || { stars: 0, completed: false };
            const isLocked = index > 0 && !STATE.levelProgress[LEVELS_CONFIG[index-1].id]?.completed;
            
            const colorClasses = {
                blue: 'bg-blue-500', red: 'bg-red-500', orange: 'bg-orange-500',
                purple: 'bg-purple-500', indigo: 'bg-indigo-500', cyan: 'bg-cyan-500',
                teal: 'bg-teal-500', yellow: 'bg-yellow-500'
            };
            const bgColor = colorClasses[level.color] || 'bg-gray-500';

            const card = document.createElement('div');
            card.className = `relative group cursor-pointer transition-all duration-300 ${isLocked ? 'opacity-50 grayscale pointer-events-none' : 'hover:-translate-y-1 hover:shadow-xl'}`;
            
            let starsHtml = '';
            for(let i=1; i<=3; i++) {
                starsHtml += `<span class="text-${i <= progress.stars ? 'yellow-400' : 'gray-300'} text-lg">⭐</span>`;
            }

            card.innerHTML = `
                <div class="bg-white rounded-2xl p-4 sm:p-6 shadow-md border-b-4 ${bgColor.replace('bg-', 'border-')} h-40 sm:h-48 flex flex-col items-center justify-between">
                    <div class="w-14 h-14 sm:w-16 sm:h-16 ${bgColor} rounded-full flex items-center justify-center text-3xl shadow-lg mb-2">
                        ${level.icon}
                    </div>
                    <div class="text-center w-full">
                        <div class="font-bold text-gray-700 text-lg">第${level.id}关</div>
                        <div class="text-gray-500 text-xs sm:text-sm mb-2 truncate">${level.topic}</div>
                        <div class="flex gap-1 justify-center">${starsHtml}</div>
                    </div>
                    ${isLocked ? '<div class="absolute inset-0 flex items-center justify-center bg-black/10 rounded-2xl"><span class="text-3xl">🔒</span></div>' : ''}
                </div>
            `;

            if (!isLocked) {
                card.onclick = () => startLevel(level.id);
            }

            container.appendChild(card);
        });
    }

    function updateHeader() {
        const streakDisplay = document.getElementById('streak-display');
        const globalProgressText = document.getElementById('global-progress-text');
        const globalProgressBar = document.getElementById('global-progress-bar');
        const wrongCountBadge = document.getElementById('wrong-count-badge');
        
        if (streakDisplay) streakDisplay.innerText = `${STATE.streak}天`;
        if (globalProgressText) globalProgressText.innerText = `${STATE.totalLearned} / 500`;
        const percent = Math.min(100, (STATE.totalLearned / 500) * 100);
        if (globalProgressBar) globalProgressBar.style.width = `${percent}%`;
        
        const wrongCount = STATE.wrongBook.length;
        if (wrongCountBadge) {
            wrongCountBadge.innerText = wrongCount;
            wrongCountBadge.classList.toggle('hidden', wrongCount === 0);
        }
    }

    function showMap() {
        hideAllViews();
        const viewMap = document.getElementById('view-map');
        if (viewMap) viewMap.classList.remove('hidden');
        renderMap();
        updateHeader();
    }

    function hideAllViews() {
        ['view-learning', 'view-map', 'view-wrongbook'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('hidden');
                el.classList.remove('flex');
            }
        });
        const completionModal = document.getElementById('completion-modal');
        if (completionModal) completionModal.classList.add('hidden');
    }

    function startLevel(levelId) {
        STATE.currentLevel = levelId;
        STATE.currentSentenceIndex = 0;
        
        if (!STATE.levelProgress[levelId]) {
            STATE.levelProgress[levelId] = { stars: 0, completed: false, correctCount: 0 };
        }

        const levelInfo = LEVELS_CONFIG.find(l => l.id === levelId);
        const headerLevelName = document.getElementById('header-level-name');
        const headerLevelTopic = document.getElementById('header-level-topic');
        const levelStars = document.getElementById('level-stars');
        
        if (headerLevelName) headerLevelName.innerText = `第${levelId}关`;
        if (headerLevelTopic) headerLevelTopic.innerText = levelInfo.topic;
        if (levelStars) levelStars.innerText = STATE.levelProgress[levelId].stars;

        hideAllViews();
        const learningView = document.getElementById('view-learning');
        if (learningView) {
            learningView.classList.remove('hidden');
            learningView.classList.add('flex');
        }
		
		    // 重置进度条容器（下次重新创建）
		const oldContainer = document.getElementById('level-progress-container');
		if (oldContainer) oldContainer.remove();
        
        loadSentence();
    }

    // ==========================================
    // 4. 粤语音频播放（预录音频）
    // ==========================================
    
    let audioCache = new Map();
    let audioIndexLoaded = false;

    async function loadAudioIndex() {
        if (audioIndexLoaded) return;
        
        try {
            const response = await fetch('./audio/index.json');
            const index = await response.json();
            
            for (const level of Object.values(index.levels)) {
                for (const item of level) {
                    const audio = new Audio();
                    audio.src = `./audio/${item.filename}`;
                    audio.preload = 'auto';
                    audioCache.set(item.text, audio);
                }
            }
            audioIndexLoaded = true;
            console.log(`✅ 已加载 ${audioCache.size} 个粤语音频`);
        } catch(e) {
            console.warn('加载音频索引失败，将使用在线TTS', e);
        }
    }

    async function speakText(text) {
        if (!text) return;
        
        if (!audioIndexLoaded) {
            await loadAudioIndex();
        }
        
        const audio = audioCache.get(text);
        
        if (audio) {
            audio.currentTime = 0;
            try {
                await audio.play();
                console.log('播放成功:', text);
                return;
            } catch(e) {
                console.log('本地播放失败:', text, e);
            }
        }
        
        // 降级：在线TTS
        try {
            const url = `https://edge-tts.vercel.app/api/tts?text=${encodeURIComponent(text)}&voice=zh-HK-HiuMaanNeural`;
            const fallbackAudio = new Audio();
            fallbackAudio.src = url;
            await fallbackAudio.play();
            console.log('在线播放成功:', text);
        } catch(e) {
            console.log('播放失败:', text);
        }
    }

    async function playCurrentAudio() {
        const sentences = getSentencesByLevel(STATE.currentLevel);
        const sentence = sentences[STATE.currentSentenceIndex];
        if (!sentence) return;
        
        const playBtn = document.querySelector('#stage-listening .group');
        if (playBtn) {
            playBtn.classList.add('scale-95');
            setTimeout(() => playBtn.classList.remove('scale-95'), 200);
        }
        
        await speakText(sentence.c);
    }

    async function playWrongAudio(index) {
        const item = STATE.wrongBook[index];
        if (item) {
            await speakText(item.sentence.c);
        }
    }

    // 预加载音频
    loadAudioIndex();

    // ==========================================
    // 5. 错题本逻辑
    // ==========================================

    function showWrongBook() {
        hideAllViews();
        const wb = document.getElementById('view-wrongbook');
        if (wb) {
            wb.classList.remove('hidden');
            wb.classList.add('flex');
        }
        renderWrongBookList();
    }

    function renderWrongBookList() {
        const container = document.getElementById('wrong-list-container');
        const emptyState = document.getElementById('wrong-empty-state');
        if (!container) return;
        container.innerHTML = '';

        if (STATE.wrongBook.length === 0) {
            if (emptyState) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }
            return;
        }

        if (emptyState) {
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
        }

        [...STATE.wrongBook].reverse().forEach((item, index) => {
            const realIndex = STATE.wrongBook.length - 1 - index;
            const levelName = LEVELS_CONFIG.find(l => l.id === item.levelId)?.topic || `第${item.levelId}关`;

            const card = document.createElement('div');
            card.className = "bg-white rounded-xl p-4 shadow-md border-l-4 border-red-400 flex flex-col justify-between animate-pop";
            
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded">${levelName}</span>
                        <span class="text-xs text-gray-400">${new Date(item.date).toLocaleDateString()}</span>
                    </div>
                    <div class="text-lg font-bold text-gray-800 mb-1">${item.sentence.c}</div>
                    <div class="text-sm text-gray-500 font-mono mb-2">${item.sentence.j}</div>
                    <div class="text-gray-600 text-sm bg-gray-50 p-2 rounded">意思：${item.sentence.m}</div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="playWrongAudio(${realIndex})" class="flex-1 py-2 bg-blue-50 text-blue-600 rounded-lg font-bold text-sm hover:bg-blue-100 btn-active flex items-center justify-center gap-1">
                        <span>🔊</span> 重听
                    </button>
                    <button onclick="removeWrongItem(${realIndex})" class="flex-1 py-2 bg-green-50 text-green-600 rounded-lg font-bold text-sm hover:bg-green-100 btn-active flex items-center justify-center gap-1">
                        <span>✅</span> 已掌握
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function removeWrongItem(index) {
        STATE.wrongBook.splice(index, 1);
        saveData();
        renderWrongBookList();
    }

    // ==========================================
    // 6. 核心学习流程
    // ==========================================

    function loadSentence() {
		const sentences = getSentencesByLevel(STATE.currentLevel);
		
		if (STATE.currentSentenceIndex >= sentences.length) {
			finishLevel();
			return;
		}

		const sentence = sentences[STATE.currentSentenceIndex];
		
		// ========== 更新进度条 ==========
		const totalInLevel = sentences.length;
		const currentIndex = STATE.currentSentenceIndex;
		const progressPercent = (currentIndex / totalInLevel) * 100;
		
		// 获取或创建进度条容器
		let progressContainer = document.getElementById('level-progress-container');
		if (!progressContainer) {
			const stageListening = document.getElementById('stage-listening');
			if (stageListening) {
				const glassCard = stageListening.querySelector('.glass-card');
				if (glassCard) {
					progressContainer = document.createElement('div');
					progressContainer.id = 'level-progress-container';
					progressContainer.className = 'w-full mb-4 px-4';
					progressContainer.innerHTML = `
						<div class="flex justify-between text-xs text-gray-500 mb-1">
							<span>📝 关卡进度</span>
							<span id="level-progress-text">0 / ${totalInLevel}</span>
						</div>
						<div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
							<div id="level-progress-bar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
						</div>
					`;
					glassCard.insertBefore(progressContainer, glassCard.firstChild);
				}
			}
		}
		
		// 更新进度条显示
		const progressText = document.getElementById('level-progress-text');
		const progressBar = document.getElementById('level-progress-bar');
		if (progressText) progressText.innerText = `${currentIndex} / ${totalInLevel}`;
		if (progressBar) progressBar.style.width = `${progressPercent}%`;
		
		// 原有的 loadSentence 代码
		const feedbackEl = document.getElementById('listening-feedback');
		if (feedbackEl) {
			feedbackEl.classList.add('hidden');
		}
		
		const optionsContainer = document.getElementById('options-container');
		if (!optionsContainer) return;
		optionsContainer.innerHTML = '';
		
		// 生成干扰选项
		const otherSentences = sentences.filter(s => s.c !== sentence.c);
		const randomOthers = [...otherSentences].sort(() => Math.random() - 0.5).slice(0, 3);
		
		let allOptions = [
			{ text: sentence.m, correct: true },
			...randomOthers.map(s => ({ text: s.m, correct: false }))
		];
		allOptions.sort(() => Math.random() - 0.5);

		allOptions.forEach(opt => {
			const btn = document.createElement('button');
			btn.className = "bg-white hover:bg-blue-50 border-2 border-gray-100 hover:border-blue-200 p-4 rounded-xl text-lg font-medium text-gray-700 shadow-sm transition-all btn-active h-20 flex items-center justify-center";
			btn.innerText = opt.text;
			btn.onclick = () => handleAnswer(opt.correct, btn, sentence);
			optionsContainer.appendChild(btn);
		});

		setTimeout(() => {
			playCurrentAudio();
		}, 300);
	}

    function handleAnswer(isCorrect, btnElement, sentenceObj) {
		const allBtns = document.querySelectorAll('#options-container button');
		allBtns.forEach(b => b.disabled = true);

		const feedbackEl = document.getElementById('listening-feedback');
		
		if (isCorrect) {
			// 正确：立即进入下一题，不显示反馈
			btnElement.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
			
			STATE.levelProgress[STATE.currentLevel].correctCount++;
			
			// 延迟0.3秒后进入下一题（不给用户额外操作）
			setTimeout(() => {
				STATE.currentSentenceIndex++;
				STATE.totalLearned++;
				saveData();
				loadSentence();
			}, 300);
		} else {
			// 错误：显示反馈，加入错题本，2秒后重试
			btnElement.classList.remove('bg-white', 'border-gray-100');
			btnElement.classList.add('bg-red-100', 'border-red-500', 'text-red-700', 'animate-shake');
			
			if (feedbackEl) {
				feedbackEl.classList.remove('hidden');
				feedbackEl.classList.add('bg-red-100', 'text-red-700');
				feedbackEl.innerHTML = '<span class="text-xl">❌</span> 答错了，已加入错题本';
			}
			
			addToWrongBook(STATE.currentLevel, sentenceObj);
			
			// 自动重播一次声音
			playCurrentAudio();
			
			setTimeout(() => {
				// 重新加载同一题
				loadSentence();
			}, 2000);
		}
	}

    function addToWrongBook(levelId, sentence) {
        const exists = STATE.wrongBook.some(item => item.sentence.c === sentence.c && item.levelId === levelId);
        if (!exists) {
            STATE.wrongBook.push({
                id: Date.now(),
                levelId: levelId,
                sentence: sentence,
                date: new Date().toISOString()
            });
            saveData();
        }
    }

    function finishLevel() {
        const progress = STATE.levelProgress[STATE.currentLevel];
        const totalSentences = getSentencesByLevel(STATE.currentLevel).length;
        
        let stars = 1;
        const accuracy = progress.correctCount / totalSentences;
        if (accuracy >= 0.8) stars = 2;
        if (accuracy === 1) stars = 3;
        
        if (stars > progress.stars) {
            progress.stars = stars;
            progress.completed = true;
            saveData();
        }

        const modalStars = document.getElementById('modal-stars');
        const modalSentences = document.getElementById('modal-sentences');
        const modalTotal = document.getElementById('modal-total');
        
        if (modalStars) modalStars.innerHTML = '⭐'.repeat(stars) + '<span class="text-gray-300">' + '⭐'.repeat(3-stars) + '</span>';
        if (modalSentences) modalSentences.innerText = `${totalSentences} 句`;
        if (modalTotal) modalTotal.innerText = `${STATE.totalLearned}/500`;
        
        const completionModal = document.getElementById('completion-modal');
        if (completionModal) completionModal.classList.remove('hidden');
		
		// 隐藏或重置进度条
		const progressContainer = document.getElementById('level-progress-container');
		if (progressContainer) {
			progressContainer.style.opacity = '0.5';
		}
		
        
        // 播放胜利音效
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046.5, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        } catch (e) {}
    }

    // 启动应用
    initApp();

	// 注册 Service Worker
	if ('serviceWorker' in navigator) {
	  window.addEventListener('load', () => {
		navigator.serviceWorker.register('./sw.js')
		  .then(reg => console.log('Service Worker registered:', reg))
		  .catch(err => console.error('SW registration failed:', err));
	  });
	}
    </script>
